name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: studentperformancechecking
  CONTAINER_REGISTRY: testdockerveeru.azurecr.io
  IMAGE_NAME: mltest
  RESOURCE_GROUP: testdockerveeru

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.CONTAINER_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t $CONTAINER_REGISTRY/$IMAGE_NAME:${{ github.sha }} .
        docker tag $CONTAINER_REGISTRY/$IMAGE_NAME:${{ github.sha }} $CONTAINER_REGISTRY/$IMAGE_NAME:latest

    - name: Push Docker Image
      run: |
        docker push $CONTAINER_REGISTRY/$IMAGE_NAME:${{ github.sha }}
        docker push $CONTAINER_REGISTRY/$IMAGE_NAME:latest

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        images: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest